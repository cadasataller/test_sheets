<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7c6af7;
      --accent2: #f76a8a;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --error: #f76a8a;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,106,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(247,106,138,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    #root { width: 100%; display: flex; justify-content: center; }
    .login-wrap { width: 100%; max-width: 420px; padding: 20px; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(124,106,247,0.12);
      border: 1px solid rgba(124,106,247,0.25);
      border-radius: 20px; padding: 4px 12px;
      font-size: 0.7rem; color: var(--accent);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px;
    }
    .badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    h1 {
      font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800;
      line-height: 1.1; margin-bottom: 8px;
      background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { font-size: 0.8rem; color: var(--muted); margin-bottom: 36px; letter-spacing: 0.05em; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,106,247,0.5), transparent);
    }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
    .input-wrap { position: relative; }
    input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 0.88rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,247,0.12); }
    input.error-input { border-color: var(--error); box-shadow: 0 0 0 3px rgba(247,106,138,0.1); }
    .show-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.75rem; font-family: 'DM Mono', monospace; padding: 4px;
      transition: color 0.2s;
    }
    .show-btn:hover { color: var(--accent); }
    .error-msg {
      display: flex; align-items: center; gap: 8px;
      background: rgba(247,106,138,0.08); border: 1px solid rgba(247,106,138,0.2);
      border-radius: 8px; padding: 10px 14px; font-size: 0.78rem; color: var(--error);
      margin-bottom: 20px; animation: shake 0.3s ease;
    }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .btn-login {
      width: 100%; background: linear-gradient(135deg, var(--accent), #9b8cf9);
      border: none; border-radius: 10px; padding: 13px; color: white;
      font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.05em; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-login:hover:not(:disabled) { opacity:0.9; transform:translateY(-1px); box-shadow:0 8px 24px rgba(124,106,247,0.3); }
    .btn-login:disabled { opacity:0.5; cursor:not-allowed; }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { margin-top: 20px; font-size: 0.7rem; color: var(--muted); text-align: center; }
    .hint code {
      background: rgba(124,106,247,0.1); border: 1px solid rgba(124,106,247,0.2);
      border-radius: 4px; padding: 1px 6px; color: var(--accent);
    }
    .dashboard { animation: fadeUp 0.5s ease both; text-align: center; }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800;
      margin: 0 auto 20px; box-shadow: 0 0 30px rgba(124,106,247,0.3);
    }
    .welcome { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .welcome-accent { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .welcome-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 28px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .stat { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 10px; }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
    .btn-logout {
      background: transparent; border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 24px; color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
